spring:
  application:
    name: ats-backend
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: true

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.offerfit.ats: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

ai:
  config:
    provider: openai
    api-url: https://api.groq.com/openai/v1/chat/completions
    api-key: ${AI_API_KEY:}
    model: openai/gpt-oss-120b
    max-tokens: 4000
    temperature: 0.3
    request-timeout-seconds: 30


